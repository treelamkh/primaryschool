<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>香港小學地圖 2025-2026</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; font-family: "Microsoft YaHei", Arial, sans-serif; }
        #map { height: 100vh; width: 100%; }
        .sidebar {
            position: absolute;
            top: 10px;
            left: 10px;
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0,0,0,0.3);
            z-index: 1000;
            width: 280px;
            max-height: 90vh;
            overflow-y: auto;
        }
        h1 { margin: 0 0 15px 0; font-size: 1.5em; color: #1e3a8a; }
        .filter-group { margin-bottom: 18px; }
        .filter-group h3 { margin: 8px 0 6px 0; font-size: 1.05em; }
        label { display: block; margin: 4px 0; cursor: pointer; }
        button {
            padding: 10px 15px;
            background: #1e40af;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1em;
        }
        button:hover { background: #2563eb; }
        .school-list {
            margin-top: 15px;
            font-size: 0.95em;
        }
        .school-item {
            padding: 6px 8px;
            margin-bottom: 4px;
            border-radius: 4px;
            cursor: pointer;
        }
        .school-item:hover { background: #f0f9ff; }
        .popup-content h3 { margin: 5px 0 8px 0; color: #1e3a8a; }
    </style>
</head>
<body>
    <div id="map"></div>

    <div class="sidebar">
        <h1>香港小學地圖</h1>
        
        <div class="filter-group">
            <h3>地區</h3>
            <div id="district-filters"></div>
        </div>
        
        <div class="filter-group">
            <h3>學校體制</h3>
            <div id="type-filters"></div>
        </div>
        
        <button onclick="resetFilters()">重置篩選</button>
        <p style="margin: 12px 0 8px 0; font-size: 1.05em;">
            找到 <strong><span id="count">0</span></strong> 間學校
        </p>
        
        <div class="school-list" id="school-list"></div>
    </div>

    <script>
        let map, markers = [], allSchools = [];

        // 初始化地圖
        function initMap() {
            // 初始化地圖（維持你原本的設定）
            map = L.map('map').setView([22.4503, 114.1611], 13);

            // ✅ 換成 Google Maps 街道圖 (Roadmap)
            L.tileLayer('https://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', {
                maxZoom: 20,
                subdomains: ['mt0', 'mt1', 'mt2', 'mt3'],
                attribution: '&copy; Google Maps'
            }).addTo(map);
        }

        // 載入 JSON 資料
        async function loadSchools() {
            try {
                const response = await fetch('2627primaryschool.json');
                allSchools = await response.json();
                createFilters();
                applyFilters();
            } catch (error) {
                alert('無法載入 JSON 檔案，請確保 2627primaryschool.json 與此 HTML 檔案在同一資料夾');
                console.error(error);
            }
        }

        // 建立篩選器
        function createFilters() {
            const districts = [...new Set(allSchools.map(s => s.地區))].sort();
            const types = [...new Set(allSchools.map(s => s.學校體制))].sort();

            const distDiv = document.getElementById('district-filters');
            districts.forEach(d => {
                const label = document.createElement('label');
                label.innerHTML = `<input type="checkbox" value="${d}" onchange="applyFilters()"> ${d}`;
                distDiv.appendChild(label);
            });

            const typeDiv = document.getElementById('type-filters');
            types.forEach(t => {
                const label = document.createElement('label');
                label.innerHTML = `<input type="checkbox" value="${t}" onchange="applyFilters()"> ${t}`;
                typeDiv.appendChild(label);
            });
        }

        // 建立彈出視窗內容
        function createPopup(school) {
            return `
                <div class="popup-content">
                    <h3>${school.學校名稱}</h3>
                    <p><strong>體制：</strong>${school.學校體制}</p>
                    <p><strong>地區：</strong>${school.地區}</p>
                    <p><strong>排名：</strong>${school["2025-2026年度全港小學排名"]}</p>
                    <p><strong>學費：</strong>$${school.學費 || 0}</p>
                    <p><strong>校車至大埔：</strong>${school["提供校車接送至大埔"]}</p>
                    <hr>
                    <p><strong>介紹：</strong>${school.學校介紹}</p>
                    <p><strong>設施：</strong>${school.學校設施}</p>
                    <small>申請截止：${school["27/28 入學申請截止日"]}</small>
                </div>
            `;
        }

        // 套用篩選
        function applyFilters() {
            const checkedDistricts = Array.from(document.querySelectorAll('#district-filters input:checked')).map(cb => cb.value);
            const checkedTypes = Array.from(document.querySelectorAll('#type-filters input:checked')).map(cb => cb.value);

            // 清空舊標記
            markers.forEach(m => map.removeLayer(m));
            markers = [];

            let filtered = allSchools;

            if (checkedDistricts.length > 0) {
                filtered = filtered.filter(s => checkedDistricts.includes(s.地區));
            }
            if (checkedTypes.length > 0) {
                filtered = filtered.filter(s => checkedTypes.includes(s.學校體制));
            }

            // 新增標記
            filtered.forEach(school => {
                if (school["學校位置 (緯度)"] && school["學校位置 (經度)"]) {
                    const marker = L.marker([school["學校位置 (緯度)"], school["學校位置 (經度)"]])
                        .bindPopup(createPopup(school));
                    marker.addTo(map);
                    markers.push(marker);
                }
            });

            document.getElementById('count').textContent = filtered.length;
            renderSchoolList(filtered);
        }

        // 側邊學校列表
        function renderSchoolList(filtered) {
            const listDiv = document.getElementById('school-list');
            listDiv.innerHTML = '<h4>學校列表</h4>';
            
            filtered.forEach(school => {
                const div = document.createElement('div');
                div.className = 'school-item';
                div.innerHTML = `
                    <strong>${school.學校名稱}</strong><br>
                    <small>${school.地區}｜${school.學校體制}</small>
                `;
                div.onclick = () => {
                    map.setView([school["學校位置 (緯度)"], school["學校位置 (經度)"]], 16);
                    // 自動開啟 popup
                    const marker = markers.find(m => 
                        m.getLatLng().lat === school["學校位置 (緯度)"] && 
                        m.getLatLng().lng === school["學校位置 (經度)"]
                    );
                    if (marker) marker.openPopup();
                };
                listDiv.appendChild(div);
            });
        }

        function resetFilters() {
            document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
            applyFilters();
        }

        // 啟動
        window.onload = () => {
            initMap();
            loadSchools();
        };
    </script>
</body>
</html>
